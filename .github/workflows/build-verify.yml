name: Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # 强制使用Node.js 24，避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Build Site
      run: |
        npm run build
        echo "✅ Hexo构建成功"
        
    - name: Verify Build Output
      run: |
        # 检查必要的文件
        REQUIRED_FILES=(
          "docs/index.html"
          "docs/css/style.css"
          "docs/2026/03/22/2026-03-22-daily-report/index.html"
        )
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file 存在"
          else
            echo "❌ $file 不存在"
            exit 1
          fi
        done
        
        echo "📊 构建统计:"
        echo "- 总文件数: $(find docs -type f 2>/dev/null | wc -l || echo 0)"
        echo "- index.html大小: $(wc -c < docs/index.html) 字节"
        echo "- 今日日报: docs/2026/03/22/2026-03-22-daily-report/index.html"