name: Deploy to GitHub Pages

on:
  # 在push到main分支时自动运行
  push:
    branches: ["main"]
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

# 全局环境变量 - 强制使用Node.js 24运行时
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 使用actions/checkout的最新稳定版本
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          # 使用最新稳定版本，GitHub会自动处理Node.js运行时
          
      - name: Verify docs directory exists
        run: |
          if [ ! -d "docs" ] || [ ! -f "docs/index.html" ]; then
            echo "❌ docs目录不存在或没有index.html"
            echo "说明: 日报生成脚本应该已经构建了docs目录"
            echo "可能的原因:"
            echo "1. 日报生成脚本未运行"
            echo "2. Hexo构建失败"
            echo "3. 手动推送了没有docs目录的代码"
            exit 1
          fi
          
          echo "✅ docs目录验证通过"
          echo "index.html大小: $(wc -c < docs/index.html) 字节"
          echo "总文件数: $(find docs -type f | wc -l)"
          
      # GitHub Pages相关actions
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传docs目录
          path: './docs'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Deployment Status
        run: |
          echo "✅ 部署完成"
          echo "网站URL: ${{ steps.deployment.outputs.page_url }}"
          echo "部署时间: $(date)"
          echo ""
          echo "📊 部署信息:"
          echo "- 使用Node.js运行时: 24 (通过FORCE_JAVASCRIPT_ACTIONS_TO_NODE24强制)"
          echo "- Actions版本: 最新稳定版"
          echo "- 源目录: main分支/docs目录"
          echo "- 目标: GitHub Pages"