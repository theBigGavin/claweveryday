name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

env:
  # 强制使用Node.js 24，避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Build Site
      run: |
        npm run build
        # Hexo已直接生成到docs目录（根据_config.yml配置）
        echo "✅ 站点构建完成"
        echo "生成的文件在: docs/"
        echo "文件数: $(find docs -type f 2>/dev/null | wc -l || echo 0)"
        
    - name: Deploy to Main Branch
      env:
        # 使用PAT或配置了写权限的GITHUB_TOKEN
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        # 配置Git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 设置远程URL使用token
        git remote set-url origin https://x-access-token:${{ env.GH_TOKEN }}@github.com/${{ github.repository }}
        
        # 检查是否有docs更改
        if [ -d "docs" ]; then
          # 删除旧的docs目录
          git rm -rf docs 2>/dev/null || true
          
          # 添加新的docs目录
          git add docs/
          
          # 提交更改
          if ! git diff --cached --quiet; then
            git commit -m "chore: 自动构建站点 [skip ci]"
            git push origin main
            echo "✅ 已部署到main分支"
          else
            echo "⚠️ 没有更改可提交"
          fi
        else
          echo "❌ docs目录不存在"
          exit 1
        fi