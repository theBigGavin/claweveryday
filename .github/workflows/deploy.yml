name: Build and Deploy to Main Branch

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

env:
  # 强制使用Node.js 24，避免警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout with token
      uses: actions/checkout@v4
      with:
        submodules: true  # 获取主题子模块
        token: ${{ secrets.GITHUB_TOKEN }}  # 使用token以便推送
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Generate Site
      run: |
        npm run build
        # 移动生成的文件到docs目录
        rm -rf docs
        mv public docs
        
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
    - name: Deploy to Docs Directory
      run: |
        # 配置远程URL使用token
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        
        # 拉取最新更改（避免冲突）
        git pull origin main --rebase --autostash
        
        # 强制替换docs目录
        git rm -rf docs/ 2>/dev/null || true
        git add docs/
        
        # 提交更改
        git commit -m "chore: 自动构建并更新docs目录 [skip ci]" || echo "没有更改可提交"
        
        # 推送到main分支（使用force-with-lease安全推送）
        git push origin main --force-with-lease