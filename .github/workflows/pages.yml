name: GitHub Pages

on:
  # 在push到main分支时自动运行
  push:
    branches: ["main"]
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # 强制使用Node.js 24，避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      # 由于我们已经有构建好的docs目录（由日报脚本生成）
      # 这里只需要验证和上传，不需要重新构建
      - name: Verify docs directory
        run: |
          if [ ! -d "docs" ] || [ ! -f "docs/index.html" ]; then
            echo "❌ docs目录不存在或没有index.html"
            echo "可能需要运行日报生成脚本"
            exit 1
          fi
          echo "✅ docs目录验证通过"
          echo "文件数: $(find docs -type f | wc -l)"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4