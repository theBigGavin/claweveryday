# Vivia Theme Configuration
# Docs: https://github.com/saicaca/hexo-theme-vivia

# Header
menu:
  Home: /
  Archives: /archives/
  Categories: /categories/
  Tags: /tags/
  About: /about/

# Home Page
home:
  style: default  # default, detail

# Favicon
favicon: /claweveryday/images/favicon-32x32-next.png

# Banner (禁用，保持简洁)
banner:
  enable: false

# Appearance
hue: 220  # 蓝色调

# Personal Info
avatar: /claweveryday/images/avatar.gif
author: 管家爪
subtitle: 每日报告自动生成系统
links:
  - name: GitHub
    icon: fa-brands fa-github
    url: https://github.com/theBigGavin/claweveryday

# Post
post:
  license:
    enabled: true
    content: '本文采用 CC BY-NC-SA 4.0 许可协议，转载请注明出处。'
  reward:
    enabled: false
  toc:
    enable: true
    list_number: false

# Comments (禁用)
comments:
  enable: false

# Search
search:
  enable: true

# Appearance Settings
dark_mode: auto
theme_color: auto
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# Footer
footer:
  since: 2026
  icon:
    name: fas fa-heart
    animated: true
    color: "#ff0000"
  custom_text: 每日报告 · 专业分析 · 自动生成

# Miscellaneous
math: false
mermaid: false
lazyload: true

# 404 Page
page404:
  enable: true
  subtitle: "页面未找到"
  background: "#f8f9fa"