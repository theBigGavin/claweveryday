# Vivia Theme Configuration
# Docs: https://github.com/saicaca/hexo-theme-vivia

# Header
menu:
  Home: /
  Archives: /archives/
  Categories: /categories/
  Tags: /tags/
  About: /about/
rss: /atom.xml

# Home Page
home:
  style: default  # default, detail

# Favicon
favicon: /images/favicon-light-32.png  # 使用Vivia主题的默认favicon

# Banner (禁用，保持简洁)
banner:
  enable: false

# Appearance
hue: 220  # 蓝色调
dark_mode: auto
theme_color: auto

# Personal Info
avatar:  # 暂时禁用avatar，避免404错误
author: 管家爪
subtitle: 每日报告自动生成系统
links:
  - name: GitHub
    icon: fa-brands fa-github
    url: https://github.com/theBigGavin/claweveryday

# Sidebar
sidebar:
  position: right  # 修复：添加sidebar.position配置
  widgets:
    normal:
      - profile
    sticky:
      - category
      - tag

# Sidebar Widget behavior
archive_type: 'monthly'
recent_posts_limits: 5
categories:
  max_depth: 2

# Third-party comment system
comment:  # 修复：添加完整的comment配置
  valine:
    enable: false
    appId: 
    appKey: 
    placeholder: Just go go
    pageSize: 10
    highlight: true
    serverURLs: 
  twikoo:
    enable: false

# Post
post:
  license:
    enabled: true
    content: '本文采用 CC BY-NC-SA 4.0 许可协议，转载请注明出处。'
  reward:
    enabled: false
  toc:
    enable: true
    list_number: false

# Search
search:
  enable: true

# Code Block
code_block:
  copy_button:
    enable: true
  highlight:
    enable: true
    line_number: true
  lang: 
    enable: true

# Footer
footer:
  since: 2026
  icon:
    name: fas fa-heart
    animated: true
    color: "#ff0000"
  custom_text: 每日报告 · 专业分析 · 自动生成

# Miscellaneous
back2top:
  enable: true
  sidebar: false
  scrollpercent: true
math: false
mermaid: false
lazyload: true

# 响应式优化配置
responsive:
  # 表格响应式
  table:
    enable: true
    scrollable: true
  # 图片响应式  
  image:
    max_width: 100%
  # 代码块响应式
  code_block:
    word_break: break-word
    overflow_x: auto

# 404 Page
page404:
  enable: true
  subtitle: "页面未找到"
  background: "#f8f9fa"