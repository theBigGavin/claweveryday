# Icarus主题配置
# 文档: https://ppoffice.github.io/hexo-theme-icarus/

# 配置版本 (必须)
version: "6.1.1"

# 主题变体: default 或 cyberpunk
variant: "default"

# 站点logo
logo: 
  text: "通信日报"

# 导航栏配置
navbar:
  # 导航菜单
  menu:
    首页: /
    归档: /archives
    分类: /categories
    标签: /tags
    关于: /about

# 文章配置
article:
  # 显示阅读时间
  readtime: true
  # 显示字数统计
  wordcount: true
  # 显示目录
  toc: true
  # 目录深度
  toc_depth: 3
  # 显示上一篇/下一篇文章
  prev_next: true
  # 显示相关文章
  related: true

# 搜索功能 (可选)
# search:
#   type: "insight"
#   # 搜索配置
#   insight:
#     # 搜索框占位符
#     placeholder: "搜索文章..."

# 评论系统 (可选)
comment:
  type: "disqus"
  shortname: "your-disqus-shortname"

# 侧边栏配置 (简化)
sidebar:
  left: {}

# 页脚配置
footer:
  # 版权信息
  copyright: "© 2026 通信日报. 保留所有权利."
  # 页脚链接
  links:
    关于: "/about"
    隐私政策: "/privacy"
    使用条款: "/terms"

# 插件配置 (简化)
plugins: {}

# CDN配置 - 使用本地资源避免CDN被屏蔽
providers:
  # 使用本地资源，避免CDN问题
  cdn: "local"

# 自定义CSS - 添加基本样式确保页面可读
custom_css:
  - "/css/custom.css"
  - "/css/custom-responsive.css"
  - "/css/fallback.css"

# 自定义JS
custom_js:
  - "/js/custom.js"

# 字体配置 - 使用系统字体避免Google字体被屏蔽
font:
  # 使用系统字体
  family:
    base: '"Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif'
    code: 'Menlo, Monaco, Consolas, "Courier New", monospace'

# 禁用可能被屏蔽的外部资源
external_resources: false